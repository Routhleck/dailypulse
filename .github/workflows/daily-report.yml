name: DailyPulse Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore history DB from gh-pages
        run: |
          mkdir -p .state
          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:data/dailypulse.db > .state/dailypulse.db 2>/dev/null || true

      - name: Generate Morning Report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_TRANSLATE: ${{ vars.LLM_TRANSLATE }}
          LLM_TRANSLATE_MODEL: ${{ vars.LLM_TRANSLATE_MODEL }}
          LLM_SUMMARY_MODEL: ${{ vars.LLM_SUMMARY_MODEL }}
          TRANSLATION_MAX_WORKERS: ${{ vars.TRANSLATION_MAX_WORKERS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_FALLBACK_MODEL: ${{ vars.OPENAI_FALLBACK_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_FALLBACK_ENABLED: ${{ vars.OPENAI_FALLBACK_ENABLED }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ vars.NVIDIA_BASE_URL }}
          NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL }}
          NVIDIA_FALLBACK_ENABLED: ${{ vars.NVIDIA_FALLBACK_ENABLED }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_ENABLED: ${{ vars.OPENROUTER_FALLBACK_ENABLED }}
          LLM_FALLBACK_API_KEY: ${{ secrets.LLM_FALLBACK_API_KEY }}
          LLM_FALLBACK_BASE_URL: ${{ vars.LLM_FALLBACK_BASE_URL }}
          LLM_FALLBACK_MODEL: ${{ vars.LLM_FALLBACK_MODEL }}
        run: python run_mission.py --db-path .state/dailypulse.db

      - name: Build Pages
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          python scripts/generate_pages.py

          # Update archive index.json
          python3 -c "
          import json, os, glob
          files = sorted(glob.glob('archive/*.html'), reverse=True)
          dates = [os.path.basename(f).replace('.html', '') for f in files]
          print(json.dumps(dates))
          " > archive/index.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f index.html archive/
          git diff --cached --quiet || git commit -m "pages: update daily report $(date -u +%Y-%m-%d)"
          git push
