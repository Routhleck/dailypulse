name: DailyPulse Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_TRANSLATE: ${{ vars.LLM_TRANSLATE }}
          LLM_TRANSLATE_MODEL: ${{ vars.LLM_TRANSLATE_MODEL }}
        run: python run_mission.py

      - name: Build Pages
        run: |
          DATE=$(date -u +%Y-%m-%d)
          python scripts/generate_pages.py

          # Fetch existing archives from gh-pages
          mkdir -p /tmp/pages/archive
          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:archive/index.json > /tmp/pages/archive/index.json 2>/dev/null || true
          for f in $(git ls-tree --name-only origin/gh-pages:archive/ 2>/dev/null | grep '\.html$'); do
            git show origin/gh-pages:archive/$f > /tmp/pages/archive/$f 2>/dev/null || true
          done

          # Copy new files
          cp index.html /tmp/pages/index.html
          cp archive/${DATE}.html /tmp/pages/archive/${DATE}.html

          # Keep only 14 most recent archives
          ls -t /tmp/pages/archive/*.html 2>/dev/null | tail -n +15 | xargs rm -f 2>/dev/null || true

          # Regenerate index.json
          python3 -c "
          import json, os, glob
          files = sorted(glob.glob('/tmp/pages/archive/*.html'), reverse=True)
          dates = [os.path.basename(f).replace('.html', '') for f in files]
          print(json.dumps(dates))
          " > /tmp/pages/archive/index.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
