name: DailyPulse Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_TRANSLATE: ${{ vars.LLM_TRANSLATE }}
          LLM_TRANSLATE_MODEL: ${{ vars.LLM_TRANSLATE_MODEL }}
        run: python run_mission.py


      - name: Publish to GitHub Pages
        run: |
          DATE=$(date -u +%Y-%m-%d)
          python scripts/generate_pages.py

          git config user.name "Intel Bot"
          git config user.email "bot@intel-briefing.com"

          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Preserve archive/ from gh-pages, copy new files
          mkdir -p /tmp/archive_backup
          cp archive/*.html /tmp/archive_backup/ 2>/dev/null || true

          cp index.html /tmp/index.html
          cp archive/${DATE}.html /tmp/archive_new.html

          git rm -rf . --quiet 2>/dev/null || true

          cp /tmp/index.html index.html
          mkdir -p archive
          cp /tmp/archive_backup/*.html archive/ 2>/dev/null || true
          cp /tmp/archive_new.html archive/${DATE}.html

          # Keep only the 14 most recent archives
          ls -t archive/*.html 2>/dev/null | tail -n +15 | xargs rm -f 2>/dev/null || true

          # Generate archive/index.json
          python3 -c "
          import json, os, glob
          files = sorted(glob.glob('archive/*.html'), reverse=True)
          dates = [os.path.basename(f).replace('.html', '') for f in files]
          print(json.dumps(dates))
          " > archive/index.json

          git add index.html archive/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "pages: update daily report ${DATE}"
            git push origin gh-pages
          fi
          git checkout main
